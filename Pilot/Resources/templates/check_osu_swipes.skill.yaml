version: 1
name: Check OSU Dining Swipes
app: Ohio State
tags: [campus, weekly]
description: |
  Goal-directed: opens the Ohio State app and drives it autonomously
  to read a dining balance or meal-swipe count. Adaptive — works even
  when the UI has moved the answer between tabs.

steps:
  - launch: Ohio State
  - goal: |
      Find and report a dining-related number visible on screen — either
      remaining meal swipes (preferred) OR Dining Dollars balance OR BuckID
      Cash. Navigate by tapping tabs/buttons as needed. Scroll if content
      extends below the fold. When a dining number is clearly visible on
      the screen, call Done with a summary like 'Dining Dollars: $12.34'
      or 'Swipes remaining: 7'. Do not tap payment confirmations.
    budget: 12
    capture_as: dining_balance
  - remember:
      key: last_dining_balance
      value: "{{ dining_balance }}"
  - done: "Recorded dining balance: {{ dining_balance }}"
